<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != 'Home' %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/docs.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <p class="brand-eyebrow">Django REST</p>
          <h1 class="brand-title">{{ site.title }}</h1>
          <p class="brand-desc">{{ site.description }}</p>
        </div>
      </div>
      <nav class="site-nav" aria-label="Documentation">
        <a href="{{ site.canonical_docs_url }}/">Home</a>
        <a href="{{ site.canonical_docs_url }}/architecture.html">Architecture</a>
        <a href="{{ site.canonical_docs_url }}/integration.html">Integration</a>
        <a href="{{ site.canonical_docs_url }}/dependencies.html">Dependencies</a>
        <a href="{{ site.canonical_docs_url }}/vendored-dia2.html">Dia2</a>
        <a href="{{ site.canonical_docs_url }}/github-pages.html">GitHub Pages</a>
        {% if site.github_repo %}
        <a class="nav-github" href="https://github.com/{{ site.github_repo }}">View on GitHub</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="site-main" id="main">
    <article class="prose">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <p>{{ site.title }} · MIT License</p>
    {% if site.github_repo %}
    <p><a href="https://github.com/{{ site.github_repo }}">{{ site.github_repo }}</a></p>
    {% endif %}
  </footer>
</body>
</html>
